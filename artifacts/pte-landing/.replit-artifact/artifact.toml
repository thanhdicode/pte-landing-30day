kind = "web"
previewPath = "/"
title = "PTE Talents – Khoá Đồng Hành 30 Ngày"
version = "1.0.0"
id = "artifacts/pte-landing"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21288

[services.development]
run = "pnpm --filter @workspace/pte-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pte-landing", "run", "build" ]
serve = "static"
publicDir = "artifacts/pte-landing/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21288"
BASE_PATH = "/"
